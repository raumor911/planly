<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <!-- ISOTIPO (ICON) GROUP -->
  <g id="isotipo" transform="translate(5, 5)">
    <!-- Main document card with folded page corner -->
    <path d="M 30,15 L 65,15 L 80,30 L 80,90 A 8,8 0 0 1 72,98 L 38,98 A 8,8 0 0 1 30,90 Z" fill="white" stroke="#172033" stroke-width="5" stroke-linejoin="round" />
    
    <!-- Curved folded corner (dog-ear) -->
    <path d="M 65,15 L 65,24 C 65,27 68,30 71,30 L 80,30" fill="#E2E8F0" stroke="#172033" stroke-width="5" stroke-linejoin="round" />
    
    <!-- Header visual block -->
    <rect x="38" y="27" width="22" height="5" rx="2.5" fill="#172033" />
    
    <!-- Document internal grid sheet rows & columns -->
    <rect x="38" y="38" width="34" height="42" fill="none" stroke="#172033" stroke-width="1.5" />
    
    <!-- Inner row lines -->
    <line x1="38" y1="48" x2="72" y2="48" stroke="#172033" stroke-width="1.5" />
    <line x1="38" y1="58" x2="72" y2="58" stroke="#172033" stroke-width="1.5" />
    <line x1="38" y1="68" x2="72" y2="68" stroke="#172033" stroke-width="1.5" />
    
    <!-- Row split divisions for spreadsheet feel -->
    <line x1="48" y1="58" x2="48" y2="80" stroke="#172033" stroke-width="1.5" />
    <line x1="60" y1="58" x2="60" y2="80" stroke="#172033" stroke-width="1.5" />

    <!-- AI badge text bubble overlapping middle-right -->
    <path d="M 78,40 L 98,40 A 6,6 0 0 1 104,46 L 104,64 A 6,6 0 0 1 98,70 L 88,70 L 80,78 L 80,70 A 6,6 0 0 1 74,64 L 74,46 A 6,6 0 0 1 80,40 Z" fill="#172033" />
    <text x="89" y="59" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="12" text-anchor="middle">AI</text>

    <!-- Checkmark circular button overlapping bottom-right -->
    <circle cx="68" cy="82" r="14" fill="white" stroke="#172033" stroke-width="4" />
    <path d="M 61,81 L 66,86 L 75,75" fill="none" stroke="#172033" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Three floatable AI Sparkles in Top-Right -->
    <path d="M 94,8 Q 94,12 98,12 Q 94,12 94,16 Q 94,12 90,12 Q 94,12 94,8 Z" fill="#172033" />
    <path d="M 106,17 Q 106,20 109,20 Q 106,20 106,23 Q 106,20 103,20 Q 106,20 106,17 Z" fill="#172033" />
    <path d="M 101,3 Q 101,5 103,5 Q 101,5 101,7 Q 101,5 99,5 Q 101,5 101,3 Z" fill="#172033" />
  </g>

  <!-- LOGOTIPO BRAND NAME -->
  <text x="125" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Outfit', 'Segoe UI', sans-serif" font-weight="800" font-size="46" fill="#172033" letter-spacing="-1.5">Planly</text>

  <!-- Split line under Logo text containing elegant teal/green dot -->
  <line x1="125" y1="84" x2="270" y2="84" stroke="#172033" stroke-width="1.5" />
  <circle cx="275" cy="84" r="3.5" fill="#172033" />
  <line x1="280" y1="84" x2="430" y2="84" stroke="#172033" stroke-width="1.5" />

  <!-- Spaced, elegant uppercase subtitle -->
  <text x="277" y="103" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Space Grotesk', 'Segoe UI', sans-serif" font-weight="700" font-size="11.5" fill="#172033" letter-spacing="4.5" text-anchor="middle">PLANEACIÓN DOCENTE CON IA</text>
</svg>
